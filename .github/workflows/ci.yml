name: CI

on:
  pull_request:
    branches:
      - master

jobs:
  test-go:
    name: Go Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Create frontend build placeholder
        run: mkdir -p frontend/netn00t-fe/build && touch frontend/netn00t-fe/build/.gitkeep
      - run: go test ./...

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/netn00t-fe/package-lock.json
      - name: Install dependencies
        working-directory: frontend/netn00t-fe
        run: npm ci
      - name: Run tests
        working-directory: frontend/netn00t-fe
        run: npm test -- --watchAll=false
        env:
          CI: true

  build:
    name: Build
    needs: [test-go, test-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/netn00t-fe/package-lock.json
      - name: Build frontend
        working-directory: frontend/netn00t-fe
        run: |
          npm ci
          npm run build
      - name: Build packages
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --snapshot --clean
      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: dist/*.deb dist/*.rpm
