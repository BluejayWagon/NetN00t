version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - "7"
    binary: netn00t
    ldflags:
      - -s -w -X main.version={{.Version}}

nfpms:
  - package_name: netn00t
    maintainer: NetN00t
    description: Web application for netbooting Sega arcade hardware (Naomi 1/2, Triforce, Chihiro)
    license: MIT
    formats:
      - deb
      - rpm
    contents:
      - src: packaging/netn00t.service
        dst: /usr/lib/systemd/system/netn00t.service
    scripts:
      preinstall: packaging/scripts/preinstall.sh
      postinstall: packaging/scripts/postinstall.sh
      preremove: packaging/scripts/preremove.sh
